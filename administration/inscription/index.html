<div class="m-1" style="max-width: 1000px;">
    <h2 class="mb-4" style="border-bottom: 3px solid #28a745; padding-bottom: 10px;">Administration des inscriptions</h2>

    <!-- Formulaire compact pour ajouter / éditer -->
    <div class="card mb-4">
        <div class="card-header bg-success text-white">
            <strong>Ajouter ou modifier une inscription</strong>
        </div>
        <div class="card-body">
            <form id="form-inscription">
                <input type="hidden" id="insc-id" name="id">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Nom de l'épreuve</label>
                        <input id="insc-nom" name="nom" class="form-control" required maxlength="100">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Date de l'épreuve</label>
                        <input id="insc-dateEpreuve" name="dateEpreuve" type="date" class="form-control" required placeholder="YYYY-MM-DD">
                        <small class="text-muted d-block mt-1" id="display-dateEpreuve"></small>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Date d'ouverture</label>
                        <input id="insc-dateOuverture" name="dateOuverture" type="date" class="form-control" required placeholder="YYYY-MM-DD">
                        <small class="text-muted d-block mt-1" id="display-dateOuverture"></small>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Date de clôture</label>
                        <input id="insc-dateCloture" name="dateCloture" type="date" class="form-control" required placeholder="YYYY-MM-DD">
                        <small class="text-muted d-block mt-1" id="display-dateCloture"></small>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Lien inscription</label>
                        <input id="insc-lienInscription" name="lienInscription" type="url" class="form-control" placeholder="https://...">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Lien voir inscrits</label>
                        <input id="insc-lienInscrit" name="lienInscrit" type="url" class="form-control" placeholder="https://...">
                    </div>
                </div>
                <div class="mt-3">
                    <button id="btn-save" type="submit" class="btn btn-success me-2">
                        <i class="bi bi-check-circle"></i> Enregistrer
                    </button>
                    <button id="btn-reset" type="reset" class="btn btn-secondary">
                        <i class="bi bi-arrow-clockwise"></i> Réinitialiser
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Liste des inscriptions -->
    <div class="card">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <strong>Liste des inscriptions</strong>
            <span class="badge bg-light text-dark">
                <span id="nb" class="fw-bold">0</span> inscription(s)
            </span>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th style="width: 25%;">Épreuve</th>
                            <th style="width: 15%;">Date</th>
                            <th style="width: 15%;">Ouverture</th>
                            <th style="width: 15%;">Clôture</th>
                            <th style="width: 30%;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="lesLignes"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
